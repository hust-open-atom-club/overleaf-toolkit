---
services:
    sharelatex:
        restart: always
        image: "${IMAGE}"
        container_name: sharelatex
        volumes:
            - "${OVERLEAF_DATA_PATH}:${OVERLEAF_IN_CONTAINER_DATA_PATH}"
        ports:
            - "${OVERLEAF_LISTEN_IP:-127.0.0.1}:${OVERLEAF_PORT:-80}:80"
        environment:
            GIT_BRIDGE_ENABLED: "${GIT_BRIDGE_ENABLED}"
            GIT_BRIDGE_HOST: "git-bridge"
            GIT_BRIDGE_PORT: "8000"
            REDIS_HOST: "${REDIS_HOST}"
            REDIS_PORT: "${REDIS_PORT}"
            V1_HISTORY_URL: "http://sharelatex:3100/api"
        env_file:
            - ../config/variables.env
        stop_grace_period: 60s
    cas-to-openid:
        image: cas-to-openid:latest
        volumes:
            - ../docker-volumes/keys:/keys
        ports:
            - "9998:9998"
        environment:
            - HOST=0.0.0.0
            - CAS_ADDRESS=https://pass.hust.edu.cn/cas
            - PREFIX_URL=/hust-login
            - ISSUER=https://cse-tex.hust.edu.cn/hust-login
            - CLIENT_POST_LOGOUT_REDIRECT_URIs=https://cse-tex.hust.edu.cn/user/settings,https://cse-tex.hust.edu.cn
            - CLIENT_ID=hust_cse_tex
            - CLIENT_SECRET=secert
            - CLIENT_REDIRECT_URIs=https://cse-tex.hust.edu.cn/oidc/login/callback
            - OPENID_KEY_PHRASE=phrase
            - SIGNING_PRIVATE_KEY=/keys/rsa.private
            - SIGNING_PUBLIC_KEY=/keys/rsa.public
        restart: unless-stopped
        # PORT: 9998
